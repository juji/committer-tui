name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            asset: committer-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            asset: committer-darwin-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: committer-linux-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: committer-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            asset: committer-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=${{ matrix.target }} src/index.tsx --outfile ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
